name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

  integration-test:
    runs-on: ubuntu-latest
    needs: unit-test
    env:
      CI: 'true'
      JWT_SECRET: lumina-ci-jwt-secret
      PIN_SALT: lumina-ci-pin-salt
      RAG_API_KEY: lumina-ci-rag-key
      API_PORT: '3001'
      READY_TIMEOUT_SEC: '45'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build:app:lazy

      - name: Start API proxy
        run: node api-proxy.js &

      - name: Wait for API readiness
        run: node scripts/check-ready.js --wait

      - name: Integration tests
        run: node scripts/test-integration.js

      - name: Post-test readiness gate
        run: node scripts/check-ready.js