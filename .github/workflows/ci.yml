name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm test

  integration-test:
    runs-on: ubuntu-latest
    needs: unit-test
    env:
      CI: 'true'
      JWT_SECRET: lumina-ci-jwt-secret-long-enough-for-hs256
      PIN_SALT: lumina-ci-pin-salt
      RAG_API_KEY: lumina-ci-rag-key
      DEEPSEEK_API_KEY: sk-ci-placeholder
      API_PORT: '3001'
      READY_TIMEOUT_SEC: '90'
      REQUIRE_ENTERPRISE_AUTH: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: npm ci
      - run: npm run build

      - name: Install RAG dependencies
        run: pip install -r rag_service/requirements.txt

      - name: Start RAG service
        run: |
          cd rag_service
          RAG_API_KEY=$RAG_API_KEY RAG_HOST=127.0.0.1 python main.py &
          cd ..
        env:
          RAG_API_KEY: ${{ env.RAG_API_KEY }}

      - name: Start API proxy
        run: node api-proxy.js &

      - name: Wait for API readiness
        run: node scripts/check-ready.js --wait

      - name: Auth tests
        run: node scripts/test-auth.js

      - name: Enterprise tests
        run: node scripts/test-enterprise.js

      - name: Security API tests (HTTP)
        run: SECURITY_HTTP_TESTS=1 node scripts/test-security-api.js

      - name: Security matrix (W1-D negative)
        run: node scripts/test-security-matrix.js
        env:
          REQUIRE_ENTERPRISE_AUTH: '1'

      - name: W2-E KB sync security/contract
        run: node scripts/test-w2-kb-sync.js
        env:
          REQUIRE_ENTERPRISE_AUTH: '1'

      - name: W2-F document versions contract
        run: node scripts/test-w2-versions.js
        env:
          REQUIRE_ENTERPRISE_AUTH: '1'

      - name: W3 observability contract
        run: node scripts/test-w3-observability.js
        env:
          REQUIRE_ENTERPRISE_AUTH: '1'

      - name: Coach RAG tests
        run: node scripts/test-coach-rag.js

      - name: Integration suite
        run: node scripts/test-integration.js

      - name: Post-test readiness gate
        run: node scripts/check-ready.js

  # Production-like path: REQUIRE_MONGODB=1 (no JSON fallback)
  integration-mongo:
    runs-on: ubuntu-latest
    needs: unit-test
    env:
      CI: 'true'
      JWT_SECRET: lumina-ci-jwt-secret-long-enough-for-hs256
      PIN_SALT: lumina-ci-pin-salt
      RAG_API_KEY: lumina-ci-rag-key
      DEEPSEEK_API_KEY: sk-ci-placeholder
      REQUIRE_ENTERPRISE_AUTH: '1'
      REQUIRE_MONGODB: '1'
      MONGODB_URI: mongodb://127.0.0.1:27017/lumina_ci
      MONGODB_DB: lumina_ci
      API_PORT: '3001'
      READY_TIMEOUT_SEC: '90'
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Start API proxy (Mongo required)
        run: node api-proxy.js &

      - name: Wait for API readiness
        run: node scripts/check-ready.js --wait

      - name: Assert Mongo storage backend
        run: node scripts/test-mongo-path.js

      - name: Auth tests (Mongo)
        run: node scripts/test-auth.js

      - name: Enterprise tests (Mongo)
        run: node scripts/test-enterprise.js

      - name: Security matrix (Mongo)
        run: node scripts/test-security-matrix.js

      - name: W3 observability (Mongo)
        run: node scripts/test-w3-observability.js

      - name: Post-test readiness gate
        run: node scripts/check-ready.js
