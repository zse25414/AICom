# Lumina 生產部署 — 請先設定 .env（不可使用開發預設密鑰）
#   docker compose -f docker-compose.prod.yml --profile full up -d

services:
  api:
    image: node:20-bookworm-slim
    working_dir: /app
    restart: unless-stopped
    command: sh -c "npm ci --omit=dev && npm run build && node api-proxy.js"
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      LUMINA_ENFORCE_SECRETS: "1"
      REQUIRE_ENTERPRISE_AUTH: "1"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      PIN_SALT: ${PIN_SALT:?PIN_SALT required}
      RAG_API_KEY: ${RAG_API_KEY:?RAG_API_KEY required}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY required}
      MONGODB_URI: ${MONGODB_URI:-}
      RAG_SERVICE_URL: http://rag:8000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS required}
    healthcheck:
      test: ["CMD", "node", "scripts/check-ready.js"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    image: node:20-bookworm-slim
    working_dir: /app
    restart: unless-stopped
    command: sh -c "npm ci --omit=dev && npm run build && npx http-server . -p 3456 -c 3600 --cors"
    ports:
      - "3456:3456"
    depends_on:
      api:
        condition: service_healthy

  rag:
    profiles: ["full"]
    build:
      context: ./rag_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LUMINA_ENFORCE_SECRETS: "1"
      RAG_API_KEY: ${RAG_API_KEY:?RAG_API_KEY required}
      RAG_HOST: 0.0.0.0
      EMBEDDING_PROVIDER: local
    volumes:
      - rag_storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  rag_storage: